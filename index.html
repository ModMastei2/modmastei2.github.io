<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playground</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css"
        integrity="sha512-KfkfwYDsLkIlwQp6LFnl8zNdLGxu9YAA1QvwINks4PhcElQSvqcyVLLD9aMhXd13uQjoXtEKNosOWaZqXgel0g=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>

<body>
    <div id="app">
        <div class="container-fluid">
            <div class="row mt-3" v-for="topic in dataSource">
                <div class="col-6">
                    <div class="card">
                        <div class="card-header">
                            {{topic.title}}
                        </div>
                        <div class="card-body">
                            <div class="d-flex justify-content-center mt-2" v-for="item in topic.arr">
                                <input type="text" class="form-control" :name="topic.title + '-input-name'"
                                    :id="topic.title + '-input-id'" :value="item.text" :disabled="item.isDisable">
                                <button class="btn btn-outline-primary btn-sm" @click="onClickCopy(item)"><i
                                        class="fa-regular fa-copy"></i></button></button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://unpkg.com/vue@3"></script>
    <script>
        const app = {
            data() {
                return {
                    dataSource: [
                        {
                            title: "Git",
                            arr: [
                                {
                                    text: "git checkout release/internal-test-sale-enhance",
                                    canCopy: true,
                                    isDisable: true
                                },
                                {
                                    text: "git branch -m 'new branch name'",
                                    canCopy: true,
                                    isDisable: true
                                }
                            ]
                        } //
                    ]
                };
            },
            methods:{
                onClickCopy(item){
                    navigator.clipboard.writeText(item.text);
                }
            }
        }
        Vue.createApp(app).mount("#app");
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
</body>

</html>
